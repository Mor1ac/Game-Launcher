<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="./Page1/style.css" />
  </head>

  <body>
    <div class="container">
      <div class="backgroundImg"></div>

      <div class="login">
        <div class="logo"></div>

        <h2>SIGN IN</h2>

        <input type="text" placeholder="username" required class="username" />
        <input
          type="password"
          placeholder="password"
          required
          class="password"
        />
        <a href="/game-launcher/Page2/index.html" class="confirm">CONFIRM</a>

        <div class="terms">
          <input type="checkbox" id="terms" />
          <label for="terms">By signing in you agree to GG Games T&C</label>
        </div>

        <div class="divider"></div>

        <div class="alternative">
          <p>Or continue with an open account</p>

          <div class="social-icons">
            <img src="./Page1/images/apple.svg" alt="apple" />
            <img src="./Page1/images/facebook.svg" alt="facebook" />
            <img src="./Page1/images/google.svg" alt="google" />
          </div>

          <div class="footer">
            <p><a href="#">No account?</a></p>
            <p><a href="#">Can't log in?</a></p>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
